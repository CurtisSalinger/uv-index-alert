AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: UV Index Alert - texts you when UV index is above threshold

Globals:
  Function:
    Timeout: 30

Resources:
  UvAlertFunction:
    Type: AWS::Serverless::Function
    Properties:
      Handler: uv_alert.handler
      Runtime: python3.12
      CodeUri: .
      MemorySize: 128
      Environment:
        Variables:
          OPENUV_API_KEY: !Ref OpenUvApiKey
          LATITUDE: !Ref Latitude
          LONGITUDE: !Ref Longitude
          TWILIO_ACCOUNT_SID: !Ref TwilioAccountSid
          TWILIO_AUTH_TOKEN: !Ref TwilioAuthToken
          TWILIO_FROM_NUMBER: !Ref TwilioFromNumber
          TO_NUMBER: !Ref ToNumber
          UV_THRESHOLD: !Ref UvThreshold
      Events:
        DailyCheck:
          Type: Schedule
          Properties:
            Schedule: cron(0 14 * * ? *)
            Description: Check UV index daily at 2pm UTC

Parameters:
  OpenUvApiKey:
    Type: String
    NoEcho: true
  Latitude:
    Type: String
    Default: '37.7749'
  Longitude:
    Type: String
    Default: '-122.4194'
  TwilioAccountSid:
    Type: String
    NoEcho: true
  TwilioAuthToken:
    Type: String
    NoEcho: true
  TwilioFromNumber:
    Type: String
  ToNumber:
    Type: String
  UvThreshold:
    Type: String
    Default: '3'

Outputs:
  UvAlertFunction:
    Description: Lambda function ARN
    Value: !GetAtt UvAlertFunction.Arn
